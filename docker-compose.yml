version: "3.8"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - teampulse

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: teampulse
      POSTGRES_USER: teampulse
      POSTGRES_PASSWORD: teampulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - teampulse

networks:
  teampulse:

volumes:
  postgres_data:
